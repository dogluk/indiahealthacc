title: India health/acc
tagline: India as the clinical validation engine for frontier health R&D
description: >-
  India health/acc — a thesis on why India is structurally positioned to become the clinical validation engine for frontier health R&D. AI is commoditising discovery; the bottleneck is now validation. India has the scale, diversity, talent, and cost structure to be where proof happens.
